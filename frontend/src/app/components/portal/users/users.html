<div class="fade-in">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>User Management</h2>
    <button class="btn btn-primary" (click)="openCreateModal()">
      <i class="bi bi-person-plus"></i> Add User
    </button>
  </div>
  
  <!-- Filters -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="row">
        <div class="col-md-4 mb-2">
          <input type="text" 
                 class="form-control" 
                 placeholder="Search by name or email..."
                 [(ngModel)]="filters.search"
                 (keyup.enter)="onSearch()">
        </div>
        <div class="col-md-3 mb-2">
          <select class="form-select" [(ngModel)]="filters.role" (change)="onFilterChange()">
            <option value="">All Roles</option>
            <option value="admin">Admin</option>
            <option value="user">User</option>
          </select>
        </div>
        <div class="col-md-3 mb-2">
          <select class="form-select" [(ngModel)]="filters.isActive" (change)="onFilterChange()">
            <option value="">All Status</option>
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>
        <div class="col-md-2 mb-2">
          <button class="btn btn-outline-secondary w-100" (click)="clearFilters()">
            <i class="bi bi-x-circle"></i> Clear
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Users Table -->
  <div class="card">
    <div class="card-body">
      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      
      <div *ngIf="!isLoading" class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of users">
              <td>{{ user.firstName }} {{ user.lastName }}</td>
              <td>{{ user.email }}</td>
              <td>
                <span class="badge" [class.bg-primary]="user.role === 'admin'"
                      [class.bg-secondary]="user.role === 'user'">
                  {{ user.role | uppercase }}
                </span>
              </td>
              <td>
                <div class="form-check form-switch">
                  <input class="form-check-input" 
                         type="checkbox" 
                         [checked]="user.isActive"
                         (change)="toggleUserStatus(user)">
                </div>
              </td>
              <td>{{ user.createdAt | date:'mediumDate' }}</td>
              <td>
                <button class="btn btn-sm btn-info me-1" (click)="openEditModal(user)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-danger" (click)="deleteUser(user._id)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="users.length === 0">
              <td colspan="6" class="text-center">No users found</td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <!-- Pagination -->
      <nav *ngIf="pagination.pages > 1" aria-label="Page navigation">
        <ul class="pagination justify-content-end">
          <li class="page-item" [class.disabled]="pagination.page === 1">
            <a class="page-link" (click)="onPageChange(pagination.page - 1)">Previous</a>
          </li>
          <li class="page-item" *ngFor="let page of [].constructor(pagination.pages); let i = index">
            <a class="page-link" [class.active]="pagination.page === i + 1" 
               (click)="onPageChange(i + 1)">{{ i + 1 }}</a>
          </li>
          <li class="page-item" [class.disabled]="pagination.page === pagination.pages">
            <a class="page-link" (click)="onPageChange(pagination.page + 1)">Next</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>

<!-- Create User Modal -->
<div class="modal fade" [class.show]="showCreateModal" tabindex="-1" 
     [style.display]="showCreateModal ? 'block' : 'none'">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create New User</h5>
        <button type="button" class="btn-close" (click)="showCreateModal = false"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="userForm">
          <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" formControlName="firstName">
          </div>
          <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" formControlName="lastName">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" formControlName="password">
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" formControlName="role">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" formControlName="phoneNumber">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="showCreateModal = false">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="createUser()" [disabled]="userForm.invalid">
          Create User
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="showCreateModal" *ngIf="showCreateModal"></div>

<!-- Edit User Modal -->
<div class="modal fade" [class.show]="showEditModal" tabindex="-1" 
     [style.display]="showEditModal ? 'block' : 'none'">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit User</h5>
        <button type="button" class="btn-close" (click)="showEditModal = false"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="editForm">
          <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" formControlName="firstName">
          </div>
          <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" formControlName="lastName">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email">
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" formControlName="role">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" formControlName="phoneNumber">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="showEditModal = false">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="updateUser()" [disabled]="editForm.invalid">
          Update User
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="showEditModal" *ngIf="showEditModal"></div>
