<section id="projects" class="projects">
  <div class="container">
    <div class="section-header fade-up">
      <span class="section-badge">Our Work</span>
      <h2 class="section-title">Featured Projects</h2>
      <p class="section-subtitle">Transforming ideas into innovative solutions</p>
    </div>
    
    <div class="projects-grid">
      <div class="project-card fade-up" *ngFor="let project of projects; let i = index" [style.animation-delay]="(i * 0.1) + 's'">
        <div class="project-image">
          <img [src]="project.image" [alt]="project.title">
          <!-- <div class="image-placeholder">
            <i class="bi bi-display"></i>
          </div> -->
          <!-- <div class="project-overlay">
            <button class="btn-view" (click)="viewProject(project.link)">View Project</button>
          </div> -->
        </div>
        <div class="project-content">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          <!-- <div class="project-tags">
            <span class="tag" *ngFor="let tag of project.tags">{{ tag }}</span>
          </div> -->
        </div>
      </div>
    </div>
  </div>
</section>
