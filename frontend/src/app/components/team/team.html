<section id="team" class="team">
  <div class="container">
    <div class="section-header fade-up">
      <span class="section-badge">The Team</span>
      <h2 class="section-title">Meet Our Experts</h2>
      <p class="section-subtitle">A small but mighty team of innovators</p>
    </div>
    
    <div class="team-grid">
      <div class="team-card fade-up" *ngFor="let member of teamMembers; let i = index" [style.animation-delay]="(i * 0.15) + 's'">
        <div class="card-image">
          <img [src]="member.image" [alt]="member.name">
          <div class="card-overlay">
            <div class="social-links">
              <a [href]="member.social.linkedin" target="_blank"><i class="bi bi-linkedin"></i></a>
              <a [href]="member.social.twitter" target="_blank"><i class="bi bi-twitter"></i></a>
              <a [href]="member.social.github" target="_blank"><i class="bi bi-github"></i></a>
            </div>
          </div>
        </div>
        <div class="card-content">
          <h3>{{ member.name }}</h3>
          <p class="role">{{ member.role }}</p>
          <p class="expertise">{{ member.expertise }}</p>
          <p class="bio">{{ member.bio }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
