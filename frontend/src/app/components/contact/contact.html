<section id="contact" class="contact">
  <div class="container">
    <div class="section-header fade-up">
      <span class="section-badge">Get In Touch</span>
      <h2 class="section-title">Let's Work Together</h2>
      <p class="section-subtitle">Have a project in mind? We'd love to hear from you.</p>
    </div>
    
    <div class="contact-grid">
      <div class="contact-info fade-up">
        <div class="info-card">
          <i class="bi bi-envelope"></i>
          <div>
            <h4>Email Us</h4>
            <p>alvexis146@gmail.com</p>
            <p>alfredrwambo624@gmail.com</p>
            <!-- <p>support@alvexistech.com</p> -->
          </div>
        </div>
        
        <div class="info-card">
          <i class="bi bi-telephone"></i>
          <div>
            <h4>Call Us</h4>
            <p>+255 749 659 994</p>
            <p>+255 697 840 133</p>
            <p>+255 614 441 723</p>
          </div>
        </div>
        
        <!-- <div class="info-card">
          <i class="bi bi-geo-alt"></i>
          <div>
            <h4>Visit Us</h4>
            <p>Dodoma, Tanzania</p>
            <p>Innovation Hub, 4th Floor</p>
          </div>
        </div> -->
        
        <!-- Map Placeholder -->
        <div class="map-placeholder">
          <iframe 
            src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15865.595390338634!2d35.817077000000005!3d-6.211010900000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2stz!4v1779828369536!5m2!1sen!2stz"
            width="100%" 
            height="200" 
            style="border:0; border-radius: 15px;" 
            allowfullscreen="" 
            loading="lazy">
          </iframe>
        </div>
        
        <!-- <div class="social-icons">
          <a href="#" target="_blank"><i class="bi bi-linkedin"></i></a>
          <a href="#" target="_blank"><i class="bi bi-twitter"></i></a>
          <a href="#" target="_blank"><i class="bi bi-github"></i></a>
          <a href="#" target="_blank"><i class="bi bi-envelope"></i></a>
        </div> -->
      </div>
      
      <div class="contact-form fade-up" style="animation-delay: 0.2s;">
        <div class="alert alert-success" *ngIf="submitSuccess">
          <i class="bi bi-check-circle"></i> Message sent successfully! We'll get back to you soon.
        </div>
        
        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <input type="text" class="form-control" placeholder="Your Name" [(ngModel)]="contactInfo.name" name="name" required>
          </div>
          <div class="form-group">
            <input type="email" class="form-control" placeholder="Your Email" [(ngModel)]="contactInfo.email" name="email" required>
          </div>
          <div class="form-group">
            <input type="text" class="form-control" placeholder="Subject" [(ngModel)]="contactInfo.subject" name="subject" required>
          </div>
          <div class="form-group">
            <textarea class="form-control" rows="5" placeholder="Your Message" [(ngModel)]="contactInfo.message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn-submit" [disabled]="isSubmitting">
            <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
            {{ isSubmitting ? 'Sending...' : 'Send Message' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
